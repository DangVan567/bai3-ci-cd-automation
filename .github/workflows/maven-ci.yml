name: BankSystem CI Automation

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Đổi 'package' thành 'verify' để kích hoạt jacoco:check
    - name: Build and Verify with Maven
      run: mvn -B clean verify

    - name: Upload JAR Artifact
      uses: actions/upload-artifact@v4
      # Thêm điều kiện always() để artifact vẫn được upload kể cả khi build bị fail do coverage thấp
      if: always() 
      with:
        name: banksystem-executable-jar-${{ matrix.os }}
        path: target/*.jar 

    # Thêm step lưu trữ báo cáo JaCoCo
    - name: Upload JaCoCo Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jacoco-report-${{ matrix.os }}
        path: target/site/jacoco/